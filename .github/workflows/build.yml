name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag do release para compilar/publicar (ex.: v1.0.79)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Verify package-lock matches package.json
        run: node scripts/validate-version-sync.cjs

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ${{ github.workspace }}\.cache\electron
          key: electron-33.4.11-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-33.4.11-${{ runner.os }}-

      - name: Install dependencies (Electron retry-safe)
        run: node scripts/ci-install-deps.cjs
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

      - name: Build web app
        run: npm run build

      - name: Build Electron installer
        run: npx electron-builder --config electron-builder.json --win --publish always
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install better-sqlite3 into packed app
        run: node scripts/install-native-sqlite.cjs --packed
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 30
